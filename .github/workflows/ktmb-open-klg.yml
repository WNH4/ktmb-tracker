name: ktmb open kluang jb nov26

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BOT_TOKEN: "8661868720:AAGoXKdncFwDCOsw_lqweIKvn3EXvGuokSM"
      CHAT_ID: "8240067274"
      FROM_STATION: "KLUANG"
      TO_STATION: "JB SENTRAL"
      TRAVEL_DATE: "2026-07-01"
      TARGET_TIME: "18:40"
      MODE: "open_check"
      TIME_WINDOW_MIN: "15"
      SALE_START_SGT: ""
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bot
        run: python main.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .state || true
          git diff --cached --quiet || git commit -m "Update KTMB open state"
          git push
